services:
  db:
    image: postgres:18.3
    restart: always
    environment:
      POSTGRES_DB: vanilla_db
      POSTGRES_USER: vanilla_admin
      POSTGRES_PASSWORD: vanilla_admin
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql

  db-test:
    image: postgres:18.3
    restart: always
    environment:
      POSTGRES_DB: vanilla_db_test
      POSTGRES_USER: vanilla_test
      POSTGRES_PASSWORD: vanilla_test
    ports:
      - "5434:5432"

volumes:
  pgdata: