<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vanilla Cakes - Cake Detail</title>
    <script type="module" src="cakeDetail.js" defer></script>
</head>
<body>
    <main id="cakeInformation">
        <h1 id="cakeName"></h1>
        <p id="cakeDescription"></p>
        <p id="cakeUnitPrice"></p>

        <div id="quantityContainer"></div>

        <p>Total: <span id="totalPrice"></span></p>

        <button id="addToCartButton">
            Add to cart
        </button>
    </main>

    <div id="errorMessageDiv" hidden>
        <p id="errorMessageParagraph"></p>
    </div>
</body>
</html>
